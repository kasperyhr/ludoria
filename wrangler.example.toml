# Ludoria Worker - example configuration for Cloudflare preview/production deployment.
# Copy to apps/worker/wrangler.toml or apps/worker/wrangler.preview.toml.

name = "ludoria-worker"
main = "apps/worker/src/index.ts"
compatibility_date = "2026-06-01"

# --- Static Assets (MVP: Worker serves Web UI) ---
# Build the web app first: corepack pnpm build
# Future: apps/web will deploy to Cloudflare Pages.
[assets]
directory = "../web/dist"
not_found_handling = "single-page-application"

# --- D1 (platform metadata) ---
[[d1_databases]]
binding = "DB"
database_name = "ludoria-db"
database_id = "REPLACE_WITH_YOUR_DATABASE_ID"

# --- Durable Objects (multiplayer sessions) ---
[[durable_objects.bindings]]
name = "GAME_SESSION_OBJECT"
class_name = "GameSessionObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameSessionObject"]

# --- Preview Environment (optional) ---
# Uncomment for a separate preview env with its own D1.
# [env.preview]
# name = "ludoria-worker-preview"
# [[env.preview.d1_databases]]
# binding = "DB"
# database_name = "ludoria-preview-db"
# database_id = "REPLACE_WITH_PREVIEW_DATABASE_ID"

# --- R2 (future) ---
# Not configured yet.
